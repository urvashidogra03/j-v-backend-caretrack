server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/caretrack-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.caretrack: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui

caretrack:
  security:
    jwt:
      secret: change-me-in-prod-32-byte-secret-min
      expirationSeconds: 36000
  seed:
    admin:
      email: admin@caretrack.health
      password: Admin@123
    demo:
      enabled: true

